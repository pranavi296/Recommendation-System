<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Feed — real-time recommendation demo</title>
<style>
  :root {
    --bg: #faf9f5;
    --surface: #ffffff;
    --ink: #1a1a18;
    --ink-soft: #6b6a63;
    --border: #e7e5dd;
    --accent: #0f6e56;
    --accent-soft: #e1f5ee;
    --pulse: #d85a30;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, "Segoe UI", Inter, sans-serif;
    background: var(--bg);
    color: var(--ink);
  }
  header {
    padding: 28px 32px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  header h1 {
    font-size: 20px;
    font-weight: 600;
    margin: 0;
    letter-spacing: -0.01em;
  }
  header p {
    margin: 4px 0 0;
    font-size: 13px;
    color: var(--ink-soft);
  }
  #reset-btn {
    border: 1px solid var(--border);
    background: var(--surface);
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    color: var(--ink);
  }
  #reset-btn:hover { border-color: var(--accent); color: var(--accent); }

  main { max-width: 1040px; margin: 0 auto; padding: 24px 32px 64px; }

  .section-label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-soft);
    margin: 32px 0 12px;
  }
  .live-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent);
    animation: pulse 1.6s infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(15,110,86,0.4); }
    70% { box-shadow: 0 0 0 6px rgba(15,110,86,0); }
    100% { box-shadow: 0 0 0 0 rgba(15,110,86,0); }
  }

  #history {
    font-size: 12.5px;
    color: var(--ink-soft);
    margin: 0 0 4px;
    min-height: 16px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 14px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    cursor: pointer;
    transition: border-color 0.15s ease, transform 0.15s ease;
  }
  .card:hover { border-color: var(--accent); transform: translateY(-1px); }

  .rec-card {
    border-color: var(--border);
    animation: fadeIn 0.35s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card .cat {
    display: inline-block;
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 2px 8px;
    border-radius: 999px;
    margin-bottom: 8px;
    color: var(--accent);
    background: var(--accent-soft);
  }
  .card .title {
    font-size: 14.5px;
    font-weight: 500;
    line-height: 1.35;
    margin: 0 0 6px;
  }
  .card .meta {
    font-size: 11.5px;
    color: var(--ink-soft);
  }
  .card .reason {
    font-size: 11px;
    color: var(--pulse);
    margin-top: 6px;
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>Live Feed</h1>
    <p>Click any card in the catalog — the "Recommended for you" rail updates instantly.</p>
  </div>
  <button id="reset-btn">Reset session</button>
</header>

<main>
  <div class="section-label"><span class="live-dot"></span> Recommended for you</div>
  <p id="history"></p>
  <div id="rec-grid" class="grid"></div>

  <div class="section-label" style="margin-top:40px;">Browse catalog</div>
  <div id="catalog-grid" class="grid"></div>
</main>

<script src="script.js"></script>
</body>
</html>
